version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: freshfood_db
    environment:
      POSTGRES_USER: freshfood_user
      POSTGRES_PASSWORD: freshfood_pass_2026
      POSTGRES_DB: freshfood_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshfood_user -d freshfood_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freshfood_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: RabbitMQ for async tasks (Phase 2)
  # rabbitmq:
  #   image: rabbitmq:3.12-management-alpine
  #   container_name: freshfood_queue
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  # rabbitmq_data:
